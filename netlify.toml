[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Extend function timeout to the maximum allowed (26s on Pro, 10s on Free)
# Note: generate-report may still timeout on Free tier due to 1–3 min Claude calls.
# For demos, use Mock Mode in the app; for production, consider Vercel.
[functions]
  timeout = 26
